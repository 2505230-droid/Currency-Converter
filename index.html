<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="box">

        <h1>CURRENCY CONVERTER</h1>

        <div class="conversion">
        <div class="from">
            <div class="dropdown">
                <div class="flag">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS12WuqBE_AN5apS8-b4-OMzZpTR9Umcw3426ZojEH1iw&s=10" alt="" id="flag-from-img">
                </div>
                <div class="option">
             <select name="" id="from-flag">
                <option value="" id="select-disabled" selected disabled>Select</option>
                <!-- <option value="USD">USD</option>
                <option value="INR">INR</option> -->
             </select>
            </div>
            </div>
            <div class="text">
            <input type="text" id="from-text" placeholder="Enter amount">
            </div>
        </div>

        <div class="logo">
            <img src="two-arrows.png" alt="">
        </div>

        <div class="to">
            <div class="dropdown">
                 <div class="flag">
                     <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS12WuqBE_AN5apS8-b4-OMzZpTR9Umcw3426ZojEH1iw&s=10" alt="" id="flag-to-img">
                </div>
                <div class="option">
            <select name="" id="to-flag" >
                <option value="" id="select-disabled" selected disabled>Select</option>
                <!-- <option value="INR">INR</option>
                <option value="USD">USD</option> -->
            </select>
            </div>
            </div>
            <div class="text">
            <input type="text" id="to-text" placeholder="Calculated amount">
            </div>
        </div>

        </div>

        <div class="comments">
            <p id="comments"></p>
        </div>

        <button id="submit">Calculate Exchange Rates</button>

        </div>

    </div>
      
    <script type="module" src="app.js"></script>
    <script type="module" src="countryCodes.js"></script>
</body>
</html>
